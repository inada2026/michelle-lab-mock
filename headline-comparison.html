<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>キャッチコピー修正前後</title>
  <style>
    :root {
      --deep: #073642;
      --aqua: #00a4bd;
      --paper: #fffaf3;
      --line: rgba(21, 50, 58, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: #15323a;
      background: var(--paper);
      font-family: "Yu Gothic", "Hiragino Sans", "Meiryo", system-ui, sans-serif;
      line-height: 1.7;
    }

    main {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 44px 0;
    }

    h1 {
      margin: 0 0 22px;
      font-size: 30px;
      line-height: 1.25;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
    }

    .label {
      padding: 14px 16px;
      color: var(--deep);
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }

    .sample {
      min-height: 430px;
      display: grid;
      align-items: center;
      padding: 34px;
      color: white;
      background:
        linear-gradient(90deg, rgba(3, 28, 35, .9), rgba(6, 76, 91, .58)),
        url("assets/ocean-board.png") center / cover;
    }

    .sample h2 {
      max-width: 560px;
      margin: 0;
      font-size: clamp(42px, 7vw, 78px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero-word {
      display: inline-block;
      position: relative;
      padding: 0 .08em;
      color: #b9f4ff;
      white-space: nowrap;
    }

    .hero-word::after {
      content: "";
      position: absolute;
      left: .04em;
      right: .04em;
      bottom: .08em;
      height: .18em;
      z-index: -1;
      background: rgba(0, 164, 189, .42);
      border-radius: 999px;
    }

    .note {
      margin: 14px 16px 16px;
      color: #5f757b;
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .grid { grid-template-columns: 1fr; }
      .sample { min-height: 320px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>キャッチコピー修正前後</h1>
    <div class="grid">
      <section class="panel">
        <div class="label">修正前: 鍵カッコあり</div>
        <div class="sample">
          <h2>いつもハワイ、波音が響く「青」を届ける。</h2>
        </div>
        <p class="note">大きな見出しでは、画面幅によって「青」の位置や鍵カッコの見え方が崩れやすい。</p>
      </section>
      <section class="panel">
        <div class="label">修正後: 鍵カッコを外して「青」を強調</div>
        <div class="sample">
          <h2>いつもハワイ、波音が響く<span class="hero-word">青</span>を届ける。</h2>
        </div>
        <p class="note">言葉の意味は残しつつ、「青」だけを色で強調して、文字組みを自然にした。</p>
      </section>
    </div>
  </main>
</body>
</html>
